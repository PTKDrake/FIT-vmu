name: Sync selected files to Google Drive

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Prepare selected files
        shell: bash
        run: |
          set -euo pipefail

          EXPORT_DIR=".gdrive-export"
          rm -rf "$EXPORT_DIR"
          mkdir -p "$EXPORT_DIR"

          if [ ! -f ".gdsync" ]; then
            echo "Missing .gdsync file"
            exit 1
          fi

          while IFS= read -r pattern || [ -n "$pattern" ]; do
            # trim
            pattern="${pattern#"${pattern%%[![:space:]]*}"}"
            pattern="${pattern%"${pattern##*[![:space:]]}"}"

            # skip empty lines and comments
            [ -z "$pattern" ] && continue
            [[ "$pattern" == \#* ]] && continue

            echo "Including: $pattern"

            # Copy matching files while preserving folder structure
            shopt -s globstar nullglob dotglob
            matches=( $pattern )
            shopt -u globstar nullglob dotglob

            if [ ${#matches[@]} -eq 0 ]; then
              echo "No matches for: $pattern"
              continue
            fi

            for item in "${matches[@]}"; do
              if [ -f "$item" ]; then
                mkdir -p "$EXPORT_DIR/$(dirname "$item")"
                cp -a "$item" "$EXPORT_DIR/$item"
              elif [ -d "$item" ]; then
                mkdir -p "$EXPORT_DIR/$item"
                cp -a "$item"/. "$EXPORT_DIR/$item/"
              fi
            done
          done < ".gdsync"

      - name: Upload to Google Drive
        run: |
          rclone sync .gdrive-export gdrive:/VMUFit/${{ github.event.repository.name }} \
            --drive-skip-gdocs \
            --progress
