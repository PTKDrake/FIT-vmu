name: Sync selected files to Google Drive

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Prepare selected files
        shell: bash
        run: |
          set -euo pipefail

          EXPORT_DIR=".gdrive-export"

          rm -rf "$EXPORT_DIR"
          mkdir -p "$EXPORT_DIR"

          if [ ! -f ".gdsync" ]; then
            echo "Missing .gdsync file"
            exit 1
          fi

          shopt -s globstar nullglob dotglob

          while IFS= read -r pattern || [ -n "$pattern" ]; do
            # Trim leading/trailing spaces
            pattern="${pattern#"${pattern%%[![:space:]]*}"}"
            pattern="${pattern%"${pattern##*[![:space:]]}"}"

            # Skip empty lines and comments
            [ -z "$pattern" ] && continue
            [[ "$pattern" == \#* ]] && continue

            echo "Including: $pattern"

            matches=( $pattern )

            if [ ${#matches[@]} -eq 0 ]; then
              echo "No matches for: $pattern"
              continue
            fi

            for item in "${matches[@]}"; do
              if [ -e "$item" ]; then
                rsync -aR "$item" "$EXPORT_DIR/"
              fi
            done
          done < ".gdsync"

          shopt -u globstar nullglob dotglob

          echo "Prepared files:"
          find "$EXPORT_DIR" -type f | sort

      - name: Upload to Google Drive
        run: |
          rclone sync .gdrive-export gdrive:/VMUFit/${{ github.event.repository.name }} \
            --drive-skip-gdocs \
            --progress
